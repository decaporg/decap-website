[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.148.1"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[dev]
  framework = "hugo"

[functions]
  directory = "functions/"
  node_bundler = "esbuild"

[[plugins]]
  package = "netlify-plugin-inline-functions-env"
  [plugins.inputs]
  include = ["BREVO_API_KEY", "BREVO_LIST_ID"]
