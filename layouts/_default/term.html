{{ define "main" }}
<div class="page">
  {{ partial "page-hero" . }}

  <div class="container size-lg">
    <section class="grid cols-2">
      {{ range .Pages.ByWeight }}
        <article class="card">
          <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
          {{ with .Description }}
            <p>{{ . }}</p>
          {{ end }}
        </article>
      {{ end }}
    </section>
  </div>
</div>
{{ end }}
