<section class="template-banner">
  <h2 class="template-banner__title heading-display">{{ .title }}</h2>
  <p class="template-banner__description">{{ .description }}</p>

  {{ with .buttons }}
    <div class="template-banner__cta">
      {{ range . }}
        <a href="{{ .href }}" class="button {{ .class }}">{{ .text }}</a>
      {{ end }}
    </div>
  {{ end }}
</section>
