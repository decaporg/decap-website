<section class="home-values">
  <div class="container size-lg">
    <div class="home-values__intro">
      <h2>{{ .title }}</h2>

      {{ with .description }}
        <p>{{ . | markdownify }}</p>
      {{ end }}
    </div>

    <div class="home-values__grid">
      {{ range .items }}
        <div class="home-values__container">
          <div class="home-values__item">
            {{ with .icon }}
              <span class="home-values__icon" aria-hidden="true">
                {{ partial "icon" . }}
              </span>
            {{ end }}

            <div class="home-values__text">
              <h3>{{ .title }}</h3>
              <p>{{ .description }}</p>
            </div>
          </div>
        </div>
      {{ end }}
    </div>
  </div>
</section>
