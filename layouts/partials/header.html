<header class="header" id="header">
  <div class="header__container container">
    <div class="header__logo">
      <a href="{{ "/" | relURL }}">
        <img src="{{ "/img/decap-logo-black.svg" | relURL }}" alt="Decap CMS">
      </a>
    </div>

    <div class="header__menu-actions">
      <button class="header__search-btn" id="mobile-search-btn" aria-label="Toggle search">
        <span class="search-icon">
          <img src="{{ "/img/search.svg" | relURL }}" alt="search">
        </span>
        <span class="close-icon" style="display: none;">&times;</span>
      </button>
      <button class="header__menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
        <span class="menu-icon">&#9776;</span>
        <span class="close-icon" style="display: none;">&times;</span>
      </button>
    </div>

    <div class="header__search-box" id="header-search">
      {{ partial "search.html" . }}
    </div>

    <nav class="header__menu" id="header-menu">
      <ul class="header__menu-list">
        {{ range .Site.Menus.main }}
        <li class="header__menu-item">
          <a href="{{ .URL | relURL }}"{{ if eq .Name "Turbo" }} class="ga-menu"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
