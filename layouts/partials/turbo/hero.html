{{ $hero := .Params.hero }}

<div class="turbo-hero">
  <div class="container">
    {{ with $hero.badge }}
      <div class="turbo-hero__badge">{{ partial "icon" "turbo-star" }} {{ . }}</div>
    {{ end }}

    <h1 class="hero-title">{{ .Title }}</h1>
    <p class="lead">{{ .Description }}</p>

    {{ with $hero.cta }}
      <a href="{{ .href }}" class="button button--secondary">{{ .text }}</a>
    {{ end }}
  </div>
</div>
