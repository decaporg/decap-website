<section class="features-prioritizer {{ .class }}" data-features-filter>
  <p class="lead">Prioritize by role</p>
  <p class="meta-info">Choose your perspective and matching features will move to the top.</p>

  <div class="features-prioritizer__controls" role="group" aria-label="{{ .ariaLabel | default "Feature prioritization" }}">
    <button type="button" class="button button--pill button--primary" data-persona="all" aria-pressed="true">All</button>

    {{ range .personaOrderByWeight }}
      <button type="button" class="button button--pill button--grey" data-persona="{{ . }}" aria-pressed="false">{{ index $.personaLabels . }}</button>
    {{ end }}
  </div>
</section>
