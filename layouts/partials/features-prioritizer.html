<section class="features-prioritizer" data-features-filter>
  <p class="lead">Prioritize by role</p>
  <p class="meta-info">Choose your perspective and matching features will move to the top.</p>

  <div class="features-prioritizer__controls" role="group" aria-label="{{ .ariaLabel | default "Feature prioritization" }}">
    <button type="button" class="features-prioritizer__pill is-active" data-persona="all">All</button>

    {{ range .personaOrderByWeight }}
      <button type="button" class="features-prioritizer__pill" data-persona="{{ . }}">{{ index $.personaLabels . }}</button>
    {{ end }}
  </div>
</section>
